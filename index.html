<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Website</h1>
<p>Welcome to my chatbot demo.</p>

<div id="chat-widget">

    <div id="chat-header">
        AI Assistant
    </div>

    <div id="chat-box">
        <p><b>Bot:</b> Hello! How can I help?</p>
    </div>

    <div id="chat-input-area">
        <input
            type="text"
            id="user-input"
            placeholder="Type a message..."
        >
        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
